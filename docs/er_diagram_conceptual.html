<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Modelo ER Conceptual - SINF1 Queima</title>
  <style>
    @page {
      size: A4 landscape;
      margin: 10mm;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f6f8fb;
      color: #172033;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: 277mm;
      min-height: 190mm;
      padding: 10mm;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 2mm;
      font-size: 20px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 5mm;
      color: #596273;
      font-size: 10.5px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .entity rect {
      fill: #ffffff;
      stroke: #26364d;
      stroke-width: 1.5;
      rx: 6;
      ry: 6;
    }

    .entity .header {
      fill: #eaf2ff;
      stroke: #26364d;
      stroke-width: 1.5;
    }

    .entity.associative .header {
      fill: #fff1d8;
    }

    .entity.support .header {
      fill: #eaf7ee;
    }

    .entity text {
      font-size: 12px;
      fill: #172033;
    }

    .entity .title {
      font-size: 14px;
      font-weight: 700;
    }

    .pk {
      font-weight: 700;
    }

    .fk {
      fill: #57657a;
    }

    .rel {
      stroke: #415168;
      stroke-width: 1.6;
      fill: none;
    }

    .rel-dashed {
      stroke-dasharray: 5 4;
    }

    .label {
      font-size: 10.5px;
      fill: #1e2a3c;
      font-weight: 700;
    }

    .note {
      font-size: 9.5px;
      fill: #596273;
    }

    .legend text {
      font-size: 10px;
      fill: #334155;
    }

    .legend-box {
      fill: #f8fafc;
      stroke: #cbd5e1;
      stroke-width: 1;
      rx: 5;
      ry: 5;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Modelo ER Conceptual - Queima das Fitas</h1>
    <p class="subtitle">Gerado a partir de <strong>sinf1_queima.sql</strong>. As tabelas associativas representam relações N:M do domínio.</p>

    <svg viewBox="0 0 1040 650" role="img" aria-label="Diagrama entidade relacionamento conceptual do projeto SINF1 Queima">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#415168"></path>
        </marker>
      </defs>

      <!-- Relationships -->
      <path class="rel" d="M 200 116 L 301 116" marker-end="url(#arrow)"></path>
      <text class="label" x="222" y="106">1</text>
      <text class="label" x="279" y="106">N</text>
      <text class="note" x="216" y="132">tem papel</text>

      <path class="rel" d="M 559 117 L 676 117" marker-end="url(#arrow)"></path>
      <text class="label" x="575" y="106">1</text>
      <text class="label" x="653" y="106">N</text>
      <text class="note" x="588" y="132">organiza</text>

      <path class="rel" d="M 797 172 L 797 261" marker-end="url(#arrow)"></path>
      <text class="label" x="807" y="197">1</text>
      <text class="label" x="807" y="245">0..N</text>
      <text class="note" x="815" y="223">acolhe</text>

      <path class="rel" d="M 449 179 L 449 261" marker-end="url(#arrow)"></path>
      <text class="label" x="459" y="205">1</text>
      <text class="label" x="459" y="246">N</text>
      <text class="note" x="468" y="229">guarda</text>

      <path class="rel" d="M 200 409 L 333 409" marker-end="url(#arrow)"></path>
      <text class="label" x="218" y="398">1</text>
      <text class="label" x="308" y="398">N</text>
      <text class="note" x="228" y="425">cria</text>

      <path class="rel" d="M 559 409 L 676 409" marker-end="url(#arrow)"></path>
      <text class="label" x="574" y="398">N</text>
      <text class="label" x="652" y="398">1</text>
      <text class="note" x="583" y="425">inclui</text>

      <path class="rel" d="M 449 497 L 449 566" marker-end="url(#arrow)"></path>
      <text class="label" x="459" y="520">N</text>
      <text class="label" x="459" y="552">1</text>
      <text class="note" x="468" y="539">evento</text>

      <path class="rel" d="M 200 497 L 333 566" marker-end="url(#arrow)"></path>
      <text class="label" x="215" y="514">N</text>
      <text class="label" x="306" y="552">1</text>
      <text class="note" x="226" y="543">utilizador</text>

      <path class="rel rel-dashed" d="M 200 453 L 676 502" marker-end="url(#arrow)"></path>
      <text class="label" x="216" y="444">1</text>
      <text class="label" x="650" y="493">0..N</text>
      <text class="note" x="405" y="466">avalia barraca</text>

      <!-- User -->
      <g class="entity" transform="translate(30 55)">
        <rect width="170" height="124"></rect>
        <rect class="header" width="170" height="31"></rect>
        <text class="title" x="14" y="21">Utilizador</text>
        <text class="pk" x="14" y="52">PK id_user</text>
        <text x="14" y="72">name</text>
        <text x="14" y="92">email</text>
        <text x="14" y="112">password_hash</text>
      </g>

      <!-- Role -->
      <g class="entity support" transform="translate(301 65)">
        <rect width="150" height="82"></rect>
        <rect class="header" width="150" height="31"></rect>
        <text class="title" x="14" y="21">Papel</text>
        <text class="pk" x="14" y="52">PK id_role</text>
        <text x="14" y="72">role_name</text>
      </g>

      <!-- Faculty -->
      <g class="entity support" transform="translate(409 55)">
        <rect width="150" height="124"></rect>
        <rect class="header" width="150" height="31"></rect>
        <text class="title" x="14" y="21">Faculdade</text>
        <text class="pk" x="14" y="52">PK id_faculty</text>
        <text x="14" y="72">name</text>
        <text x="14" y="92">acronym</text>
        <text x="14" y="112">color</text>
      </g>

      <!-- Tent -->
      <g class="entity" transform="translate(676 45)">
        <rect width="170" height="127"></rect>
        <rect class="header" width="170" height="31"></rect>
        <text class="title" x="14" y="21">Barraca</text>
        <text class="pk" x="14" y="52">PK id_tent</text>
        <text class="fk" x="14" y="72">FK id_faculty</text>
        <text x="14" y="92">name, location</text>
        <text x="14" y="112">open_time, close_time</text>
      </g>

      <!-- Event -->
      <g class="entity" transform="translate(676 261)">
        <rect width="180" height="136"></rect>
        <rect class="header" width="180" height="31"></rect>
        <text class="title" x="14" y="21">Evento</text>
        <text class="pk" x="14" y="52">PK id_event</text>
        <text class="fk" x="14" y="72">FK id_tent (opcional)</text>
        <text x="14" y="92">name, description</text>
        <text x="14" y="112">event_date, location</text>
        <text x="14" y="132">event_type</text>
      </g>

      <!-- Artist -->
      <g class="entity" transform="translate(30 566)">
        <rect width="170" height="82"></rect>
        <rect class="header" width="170" height="31"></rect>
        <text class="title" x="14" y="21">Artista</text>
        <text class="pk" x="14" y="52">PK id_artist</text>
        <text x="14" y="72">name, musical_genre</text>
      </g>

      <!-- Event artist -->
      <g class="entity associative" transform="translate(333 566)">
        <rect width="226" height="74"></rect>
        <rect class="header" width="226" height="31"></rect>
        <text class="title" x="14" y="21">Participacao em Evento</text>
        <text class="pk" x="14" y="52">PK/FK id_event + id_artist</text>
        <text x="14" y="72">resolve Artista N:M Evento</text>
      </g>

      <!-- Personal agenda -->
      <g class="entity associative" transform="translate(333 261)">
        <rect width="226" height="74"></rect>
        <rect class="header" width="226" height="31"></rect>
        <text class="title" x="14" y="21">Agenda Pessoal</text>
        <text class="pk" x="14" y="52">PK/FK id_user + id_event</text>
        <text x="14" y="72">resolve Utilizador N:M Evento</text>
      </g>

      <!-- Rating -->
      <g class="entity associative" transform="translate(30 361)">
        <rect width="170" height="136"></rect>
        <rect class="header" width="170" height="31"></rect>
        <text class="title" x="14" y="21">Avaliacao</text>
        <text class="pk" x="14" y="52">PK id_rating</text>
        <text class="fk" x="14" y="72">FK id_user</text>
        <text class="fk" x="14" y="92">FK id_event opcional</text>
        <text class="fk" x="14" y="112">FK id_tent opcional</text>
        <text x="14" y="132">score [1..5]</text>
      </g>

      <!-- Legend -->
      <g class="legend" transform="translate(880 500)">
        <rect class="legend-box" width="145" height="112"></rect>
        <text x="12" y="22">Legenda</text>
        <text x="12" y="44">PK: chave primaria</text>
        <text x="12" y="62">FK: chave estrangeira</text>
        <text x="12" y="80">N:M via entidade</text>
        <text x="12" y="98">associativa</text>
      </g>
    </svg>
  </main>
</body>
</html>
